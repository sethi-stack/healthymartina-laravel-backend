##
## Nginx virtual host for HealthyMartina Laravel API
## Place at: /etc/nginx/sites-available/healthymartina-api
## Enable: sudo ln -s /etc/nginx/sites-available/healthymartina-api /etc/nginx/sites-enabled/
## Reload:  sudo systemctl reload nginx
##
## Replace "api.yourdomain.com" with your actual API domain/subdomain.
##

server {
    listen 80;
    server_name api.yourdomain.com;

    # After running Certbot, it will update this block with SSL.
    # Until then, HTTP works for initial testing.

    root /var/www/healthymartina/api/public;
    index index.php;

    # Max upload size (for recipe images / profile photos)
    client_max_body_size 20M;

    # Logging
    access_log /var/log/nginx/healthymartina-api.access.log;
    error_log  /var/log/nginx/healthymartina-api.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Increase timeouts for PDF exports (DomPDF can take a few seconds)
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
